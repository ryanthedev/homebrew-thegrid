name: Update Formula

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version number'
        required: true
        type: string
      sha256:
        description: 'SHA256 checksum of the tarball'
        required: true
        type: string
      tarball_url:
        description: 'URL to download the release tarball'
        required: true
        type: string

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Update formula
        env:
          INPUT_VERSION: ${{ inputs.version }}
          INPUT_SHA256: ${{ inputs.sha256 }}
          INPUT_TARBALL_URL: ${{ inputs.tarball_url }}
        run: |
          echo "Updating formula to version $INPUT_VERSION"

          sed -i 's/version ".*"/version "'"$INPUT_VERSION"'"/' Formula/thegrid.rb
          sed -i 's|url ".*"|url "'"$INPUT_TARBALL_URL"'"|' Formula/thegrid.rb
          sed -i 's/sha256 ".*"/sha256 "'"$INPUT_SHA256"'"/' Formula/thegrid.rb

          # Download tarball and replace install block from FORMULA_INSTALL
          curl -sL "$INPUT_TARBALL_URL" -o /tmp/release.tar.gz
          ACTUAL_SHA=$(sha256sum /tmp/release.tar.gz | cut -d' ' -f1)
          if [ "$ACTUAL_SHA" != "$INPUT_SHA256" ]; then
            echo "ERROR: SHA256 mismatch! Expected $INPUT_SHA256, got $ACTUAL_SHA"
            exit 1
          fi

          mkdir -p /tmp/release
          tar -xzf /tmp/release.tar.gz -C /tmp/release --strip-components=1

          if [ -f /tmp/release/FORMULA_INSTALL ]; then
            echo "Found FORMULA_INSTALL, updating install block"
            cat > /tmp/update_formula.py << 'PYEOF'
          import re, sys
          with open(sys.argv[1]) as f:
              content = f.read()
          with open(sys.argv[2]) as f:
              install_body = f.read().rstrip()
          content = re.sub(
              r'(  def install\n).*?(  end)',
              lambda m: m.group(1) + install_body + '\n  end',
              content,
              count=1,
              flags=re.DOTALL
          )
          with open(sys.argv[1], 'w') as f:
              f.write(content)
          PYEOF
            python3 /tmp/update_formula.py Formula/thegrid.rb /tmp/release/FORMULA_INSTALL
          else
            echo "No FORMULA_INSTALL in tarball, keeping existing install block"
          fi

          echo ""
          cat Formula/thegrid.rb

      - name: Commit and push
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add Formula/thegrid.rb
          git commit -m "chore: update formula for thegrid v$INPUT_VERSION"
          git push
